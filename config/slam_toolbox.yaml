slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames and input topics
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Online mapping mode
    mode: mapping

    # Core map settings
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 12.0

    # Timing and TF behavior
    transform_publish_period: 0.02
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    minimum_time_interval: 0.25

    # Odometry/scan-gating for smoother local map growth
    throttle_scans: 1
    minimum_travel_distance: 0.08
    minimum_travel_heading: 0.08
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 10.0

    # Scan matching and loop closure
    use_scan_matching: true
    use_scan_barycenter: true
    do_loop_closing: true
    link_match_minimum_response_fine: 0.1
    link_match_minimum_response_coarse: 0.35
    loop_search_maximum_distance: 4.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance: 3.0
    loop_match_minimum_response_fine: 0.35
    loop_match_minimum_response_coarse: 0.45

    # Solver tuning (default robust setup for real robots)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
